<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0b0704" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Garson AI" />
    <title>Bistro 7 — Sanal Garson</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg: #0b0704;
        --surf: #160e08;
        --surf2: #1f1409;
        --bord: rgba(210,160,70,0.15);
        --gold: #c9913a;
        --gsoft: #e8b86d;
        --gdim: rgba(201,145,58,0.22);
        --cream: #f0ddc4;
        --muted: #7a6448;
        --red: #c04040;
        --green: #3a8a5c;
        --blue: #3a6a9a;
        --fh: 'Playfair Display', serif;
        --fb: 'Crimson Pro', serif;
      }
      html, body {
        background: #0b0704 !important;
        color: #f0ddc4 !important;
        font-family: 'Crimson Pro', serif;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }
      input, textarea, button, select { font-family: 'Crimson Pro', serif; }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(201,145,58,0.22); border-radius: 2px; }
      #root { min-height: 100vh; background: #0b0704; }

      @media (min-width: 600px) {
        body {
          background: #050302 !important;
          display: flex !important;
          align-items: center !important;
          justify-content: center !important;
          min-height: 100vh !important;
        }
        #root {
          width: 420px !important;
          height: 100vh !important;
          max-height: 900px !important;
          border-radius: 32px !important;
          overflow: hidden !important;
          box-shadow: 0 0 0 1px rgba(201,145,58,0.2), 0 40px 80px rgba(0,0,0,0.8), 0 0 60px rgba(201,145,58,0.06) !important;
          position: relative !important;
        }
      }

      @keyframes fadeUp   { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
      @keyframes fadeIn   { from{opacity:0} to{opacity:1} }
      @keyframes pulse    { 0%,100%{box-shadow:0 0 0 0 rgba(192,64,64,.6)} 50%{box-shadow:0 0 0 14px rgba(192,64,64,0)} }
      @keyframes waveBar  { 0%,100%{transform:scaleY(.3)} 50%{transform:scaleY(1)} }
      @keyframes glow     { 0%,100%{opacity:.4} 50%{opacity:1} }
      @keyframes bounce   { 0%{transform:scale(.8);opacity:0} 60%{transform:scale(1.05)} 100%{transform:scale(1);opacity:1} }
      @keyframes spin     { to{transform:rotate(360deg)} }
      @keyframes blink    { 0%,100%{opacity:1} 50%{opacity:.4} }
      @keyframes float    { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
      @keyframes slideIn  { from{opacity:0;transform:translateX(-14px)} to{opacity:1;transform:translateX(0)} }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
