<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0704" />
    <meta name="description" content="Sanal Garson — Dijital garson uygulaması" />

    <!-- PWA genel -->
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS PWA destekleri -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sanal Garson" />
    <meta name="format-detection" content="telephone=no" />

    <!-- iOS apple-touch-icon (tek boyut yeterli, iOS 512'yi de uygun boyuta ölçekler) -->
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/icon-192.png" />

    <title>Sanal Garson</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Service Worker: sessiz güncelleme
      // Yeni sürüm deploy edilince arka planda install olur, activate olur,
      // ama mevcut açık tab'ler eski sürümle çalışmaya devam eder (kesinti yok).
      // Kullanıcı sayfayı yenilediğinde veya yeni sekme açtığında otomatik yeni sürümü alır.
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(reg => {
            // Her açılışta güncellemeyi kontrol et (SW kendini update eder)
            reg.update().catch(() => {});
          }).catch(() => {});
        });
      }
    </script>
  </body>
</html>
